name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install C compiler (required for DuckDB CGo)
        run: sudo apt-get install -y gcc

      - name: Build
        run: CGO_ENABLED=1 go build -o bin/data ./cmd

      - name: Test
        run: go test ./... -race -count=1

  # GitHub Copilot PR summary is a native GitHub feature.
  # Enable it at: Settings → Copilot → "Summarize pull requests"
  # No workflow step needed — Copilot adds the summary automatically.
